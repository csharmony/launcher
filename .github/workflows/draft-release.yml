name: Draft Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
  draft-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore Launcher.slnx

      - run: dotnet publish Launcher/Launcher.csproj -c Release -r win-x64 --self-contained false -o ./publish

      - name: Calculate MD5
        shell: bash
        run: |
          echo "MD5_HASH=$(md5sum ./publish/Launcher.exe | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Upload to VirusTotal
        id: vt
        uses: cssnr/virustotal-action@v2
        continue-on-error: true
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          file_globs: ./publish/Launcher.exe
          update_release: false
          sha256: true
          summary: false

      - name: Compose release body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo '> [!IMPORTANT]' > body.md
          echo '> .NET Runtime 10.0 is required to run the launcher. Download it from [**here**](https://dotnet.microsoft.com/en-us/download/dotnet/thank-you/runtime-10.0.9-windows-x64-installer).' >> body.md
          echo '' >> body.md

          echo '## Changelog' >> body.md
          gh api /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name='${{ inputs.tag }}' \
            --jq '.body' >> body.md
          echo '' >> body.md

          echo '## VirusTotal' >> body.md
          echo "**MD5 Hash:** \`${{ env.MD5_HASH }}\`" >> body.md
          vtResult='${{ steps.vt.outputs.json }}'
          if [ -n "$vtResult" ]; then
            vtLink=$(echo "$vtResult" | jq -r '.[0].link')
            echo "[**Check the analysis here.**]($vtLink)" >> body.md
          else
            echo "Failed to upload to VirusTotal." >> body.md
          fi

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: true
          body_path: body.md
          prerelease: ${{ inputs.prerelease }}
          files: ./publish/Launcher.exe
