name: Draft Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
  draft-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore Launcher.slnx
      
      - run: dotnet publish Launcher/Launcher.csproj -c Release -r win-x64 --self-contained false -o ./publish-windows
      - run: dotnet publish Launcher/Launcher.csproj -c Release -r linux-x64 --self-contained false -p:AssemblyName=Launcher_linux64 -o ./publish-linux
      - run: dotnet publish Launcher/Launcher.csproj -c Release -r win-x64 --self-contained true -p:AssemblyName=Launcher-sc -o ./publish-windows-sc
      - run: dotnet publish Launcher/Launcher.csproj -c Release -r linux-x64 --self-contained true -p:AssemblyName=Launcher-sc_linux64 -o ./publish-linux-sc

      - name: Calculate MD5
        shell: bash
        run: |
          echo "MD5_HASH_WINDOWS=$(md5sum ./publish-windows/Launcher.exe | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "MD5_HASH_LINUX=$(md5sum ./publish-linux/Launcher_linux64 | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Upload to VirusTotal
        id: vt
        uses: cssnr/virustotal-action@v2
        continue-on-error: true
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          file_globs: |
            ./publish-windows/Launcher.exe
            ./publish-linux/Launcher_linux64
          update_release: false
          sha256: true
          summary: false

      - name: Compose release body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo '> [!IMPORTANT]' > body.md
          echo '> .NET Runtime 10.0 is required to run the normal variant of the launcher (`Launcher.exe`, `Launcher_linux64`). Download it from [**here**](https://dotnet.microsoft.com/en-us/download/dotnet/10.0#runtime-10.0.10).' >> body.md
          echo '> If you do not want to download .NET Runtime 10.0, you can use the **self-contained** variant instead (`Launcher-sc.exe`, `Launcher-sc_linux64`). It has .NET Runtime 10.0 inside the executable, making the size around 80MB.' >> body.md
          echo '' >> body.md

          echo '## Changelog' >> body.md
          gh api /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name='${{ inputs.tag }}' \
            --jq '.body' >> body.md
          echo '' >> body.md

          echo '## VirusTotal' >> body.md
          vtResult='${{ steps.vt.outputs.json }}'
          
          echo '### Windows' >> body.md
          echo "**MD5 Hash:** \`${{ env.MD5_HASH_WINDOWS }}\`" >> body.md
          if [ -n "$vtResult" ]; then
            vtLink=$(echo "$vtResult" | jq -r '.[] | select(.name | endswith("Launcher.exe")) | .link')
            echo "[**Check the analysis here.**]($vtLink)" >> body.md
          else
            echo "Failed to upload to VirusTotal." >> body.md
          fi

          echo '### Linux' >> body.md
          echo "**MD5 Hash:** \`${{ env.MD5_HASH_LINUX }}\`" >> body.md
          if [ -n "$vtResult" ]; then
            vtLink=$(echo "$vtResult" | jq -r '.[] | select(.name | endswith("Launcher_linux64")) | .link')
            echo "[**Check the analysis here.**]($vtLink)" >> body.md
          else
            echo "Failed to upload to VirusTotal." >> body.md
          fi

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: true
          body_path: body.md
          prerelease: ${{ inputs.prerelease }}
          files: |
            ./publish-windows/Launcher.exe
            ./publish-windows-sc/Launcher-sc.exe
            ./publish-linux/Launcher_linux64
            ./publish-linux-sc/Launcher-sc_linux64
